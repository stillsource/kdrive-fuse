# GoReleaser config — https://goreleaser.com
# Build + publish cross-platform binaries on a `v*` tag. See .github/workflows/release.yml.
version: 2

project_name: kdrive-fuse

before:
  hooks:
    - go mod download

builds:
  - id: kdrive-fuse
    main: ./cmd/kdrive-fuse
    binary: kdrive-fuse
    env:
      - CGO_ENABLED=0 # go-fuse v2 is pure Go, so cross-compilation needs no C toolchain
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
  - id: kdrive
    main: ./cmd/kdrive
    binary: kdrive
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: kdrive-fuse
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - ROADMAP.md
      - LICENSE

checksum:
  name_template: checksums.txt

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^ci:"
      - "^refactor:"
      - "^style:"
      - "^build:"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Others
      order: 999

release:
  draft: false
  prerelease: auto # tags like v1.2.3-rc1 become pre-releases
