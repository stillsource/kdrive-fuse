name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - run: go vet ./...
      - run: go build ./...
      - name: Install fuse3
        run: sudo apt-get update && sudo apt-get install -y fuse3
      - name: Tests with race + coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic \
            -coverpkg=./pkg/... \
            ./pkg/... ./cmd/...
      - name: Coverage gate (minimum 90%)
        run: |
          pct=$(go tool cover -func=coverage.out | awk '/^total:/{print $3}' | tr -d '%')
          echo "coverage: ${pct}%"
          awk -v p="$pct" 'BEGIN { if (p+0 < 90) { print "below 90%"; exit 1 } }'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          check-latest: true
      - uses: golangci/golangci-lint-action@v8
        with:
          version: latest
